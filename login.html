<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopTrack - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 40%, #43a047 100%);
      padding: 20px;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      50% { transform: translateX(10px); }
      75% { transform: translateX(-5px); }
    }
    .shake { animation: shake 0.4s ease; }
    .login-brand {
      text-align: center;
      margin-bottom: 30px;
      color: white;
    }
    .login-brand .logo {
      font-size: 3.5rem;
      margin-bottom: 8px;
    }
    .login-brand h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .login-brand p {
      font-size: 0.95rem;
      opacity: 0.85;
      margin-top: 4px;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-card h2 {
      text-align: center;
      color: #1b5e20;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .login-card .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
    }
    .form-group input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.3s, box-shadow 0.3s;
      outline: none;
    }
    .form-group input:focus {
      border-color: #2e7d32;
      box-shadow: 0 0 0 3px rgba(46,125,50,0.15);
    }
    .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      color: #888;
      padding: 4px;
    }
    .toggle-pass:hover { color: #1b5e20; }
    .error-msg {
      display: none;
      background: #ffebee;
      color: #c62828;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 20px;
      border-left: 4px solid #c62828;
    }
    .error-msg.show { display: block; }
    .btn-login {
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, #2e7d32, #43a047);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(46,125,50,0.4);
    }
    .btn-login:active {
      transform: translateY(0);
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
    }
    .lock-icon {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-brand">
      <div class="logo">&#128295;</div>
      <h1>ShopTrack</h1>
      <p>Auto Repair Shop Manager</p>
    </div>

    <div class="login-card" id="login-card">
      <div class="lock-icon">&#128274;</div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to access your dashboard</p>

      <div class="error-msg" id="error-msg">
        Invalid username or password. Please try again.
      </div>

      <form id="login-form" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" autofocus required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="toggle-pass" onclick="togglePassword()" title="Show/Hide Password">&#128065;</button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btn-login">
          Sign In
        </button>
      </form>
    </div>

    <div class="login-footer">
      ShopTrack v1.0 &copy; 2026
    </div>
  </div>

<script>
    // Default credentials
    var VALID_USER = "admin";
    var VALID_PASS_HASH = "d386271dd3bec97d9f7295495430eef464b1913a981fa5a3ea669f2939dd368e";

    // Check if already logged in
    if (sessionStorage.getItem("shoptrack_auth") === "true") {
      window.location.href = "index.html";
    }

    function togglePassword() {
      var inp = document.getElementById("password");
      var btn = document.querySelector(".toggle-pass");
      if (inp.type === "password") {
        inp.type = "text";
        btn.innerHTML = "&#128064;";
      } else {
        inp.type = "password";
        btn.innerHTML = "&#128065;";
      }
    }

    async function sha256(message) {
      var msgBuffer = new TextEncoder().encode(message);
      var hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
      var hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(function(b) { return b.toString(16).padStart(2, "0"); }).join("");
    }

    async function handleLogin(e) {
      e.preventDefault();
      var username = document.getElementById("username").value.trim().toLowerCase();
      var password = document.getElementById("password").value;
      var errorEl = document.getElementById("error-msg");
      var card = document.getElementById("login-card");
      var btn = document.getElementById("btn-login");

      btn.disabled = true;
      btn.textContent = "Signing in...";

      // Small delay for UX
      await new Promise(function(r) { setTimeout(r, 500); });

      var passHash = await sha256(password);

      if (username === VALID_USER && passHash === VALID_PASS_HASH) {
        sessionStorage.setItem("shoptrack_auth", "true");
        sessionStorage.setItem("shoptrack_user", username);
        window.location.href = "index.html";
      } else {
        errorEl.classList.add("show");
        card.classList.add("shake");
        setTimeout(function() { card.classList.remove("shake"); }, 400);
        btn.disabled = false;
        btn.textContent = "Sign In";
        document.getElementById("password").value = "";
        document.getElementById("password").focus();
      }

      return false;
    }

    // Allow Enter key
    document.getElementById("password").addEventListener("keydown", function(e) {
      if (e.key === "Enter") { document.getElementById("login-form").requestSubmit(); }
    });
  </script>
</body>
</html>
